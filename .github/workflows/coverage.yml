name: Update coverage

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # token padrão já consegue dar push de volta no mesmo branch
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Sync coverage into /public
        run: node scripts/sync-coverage.mjs

      - name: Commit updated coverage
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/coverage-report public/coverage-lcov.info public/coverage-summary.json
          if git diff --cached --quiet; then
            echo "Sem mudanças na cobertura."
          else
            git commit -m "chore(coverage): atualizar relatório [skip ci]"
            git push
          fi
